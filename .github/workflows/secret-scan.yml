name: secret-scan

# Scans for committed secrets (API keys, tokens) on every push and PR.
# Free for public repos. Fails the check if anything secret-shaped is found.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the whole repo is scanned, not just the tip
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
