# One-command run:  docker compose up
#
# 1. cp .env.example .env   and fill in ANTHROPIC_API_KEY (others optional)
# 2. docker compose up --build
# 3. open http://localhost:3000
#
# Note: without SUPABASE_* in .env, runs use a local fallback that is ephemeral
# inside the container. Set SUPABASE_URL + SUPABASE_KEY for durable storage.

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        # The browser calls the API on the host's mapped port.
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
